services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_DB=stlvault
      - POSTGRES_USER=${POSTGRES_USER:-stlvault}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stlvault} -d stlvault"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    pull_policy: build
    environment:
      - FILE_STORAGE=/app/uploads #DO NOT CHANGE, MODIFY THE BINDS
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-stlvault}:${POSTGRES_PASSWORD}@postgres:5432/stlvault
      - WEBUI_URL=${APP_URL}
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@stlvault.mil}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
    ports:
      - "${API_PORT}:8080"
    volumes:
      - ${UPLOAD_PATH}:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
    environment:
      - TERA_API_URL=${API_URL}
      - TERA_APP_URL=${APP_URL}
    pull_policy: build
    volumes:
      - node_modules:/app/node_modules
    ports:
      - "${APP_PORT}:5173"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  node_modules:
